<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>MotoNav (Refactored)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;background:#111;color:#fff;overflow:hidden}
.screen{height:100vh;display:flex;flex-direction:column}
.hidden{display:none!important}

.header{padding:16px;display:flex;justify-content:space-between;align-items:center}
.panel{padding:12px 16px}
input{width:100%;padding:12px;border-radius:10px;border:none;background:#1c1c1e;color:#fff}
button{padding:10px;border-radius:10px;border:none;cursor:pointer}

.list{background:#1c1c1e;margin-top:6px;border-radius:10px;overflow:hidden;max-height:180px;overflow-y:auto}
.item{padding:10px;border-bottom:1px solid #2a2a2a;cursor:pointer}
.item:last-child{border-bottom:none}

.fav{background:#161618;padding:10px;display:flex;gap:8px;align-items:center}
.fav input{flex:1}

.map{flex:1}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="header">
    <h2>MotoNav</h2>
  </div>

  <div class="panel">
    <input id="dest" placeholder="Where to?" oninput="onSearch()"/>
    <div id="results" class="list hidden"></div>
  </div>

  <div class="panel fav" id="favPanel" class="hidden"></div>

  <div class="panel">
    <button onclick="plan()">Preview Route</button>
  </div>
</div>

<!-- MAP -->
<div id="mapScreen" class="screen hidden">
  <div id="map" class="map"></div>
</div>

<script>
let pending=null;
let lastQuery="";
let lock=false;

function onSearch(){
  lock=false;
  const q=document.getElementById('dest').value.trim();
  const el=document.getElementById('results');

  if(q.length<3){el.classList.add('hidden');return;}
  setTimeout(()=>search(q),300);
}

async function search(q){
  if(lock)return;
  const el=document.getElementById('results');
  el.classList.remove('hidden');
  el.innerHTML="Searching...";

  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`);
  const data=await r.json();

  window._data=data;

  el.innerHTML=data.map((d,i)=>`
    <div class='item' onclick='selectDest(${i})'>
      <b>${d.name||d.display_name.split(',')[0]}</b><br>
      <small>${d.display_name}</small>
    </div>
  `).join('');
}

function selectDest(i){
  const d=window._data[i];
  pending={lat:+d.lat,lng:+d.lon,name:d.display_name};

  document.getElementById('dest').value=d.display_name.split(',')[0];

  showFav(d);
  hideResults();
}

function showFav(d){
  const p=document.getElementById('favPanel');
  p.innerHTML=`
    ⭐ <input id='favName' placeholder='Save favorite name'/>
    <button onclick='saveFav()'>Save</button>
  `;
  p.classList.remove('hidden');
}

function saveFav(){
  const name=document.getElementById('favName').value||pending.name;
  const favs=JSON.parse(localStorage.getItem('favs')||'[]');
  favs.push({...pending,alias:name});
  localStorage.setItem('favs',JSON.stringify(favs));
  document.getElementById('favPanel').classList.add('hidden');
}

function hideResults(){
  document.getElementById('results').classList.add('hidden');
}

async function plan(){
  if(!pending)return alert('Select destination');
  document.getElementById('home').classList.add('hidden');
  document.getElementById('mapScreen').classList.remove('hidden');

  const map=L.map('map').setView([pending.lat,pending.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([pending.lat,pending.lng]).addTo(map);
}
</script>
</body>
</html>
