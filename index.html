<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<title>MotoNav</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { background:#111; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; height:100vh; display:flex; flex-direction:column; user-select:none; }
.screen { width:100%; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.hidden { display:none !important; }

.home-header { padding:1.8rem 1.5rem 0.8rem; display:flex; align-items:flex-start; justify-content:space-between; }
.home-header h1 { font-size:2rem; font-weight:700; letter-spacing:-1px; }
.home-header p { color:#666; font-size:0.75rem; margin-top:3px; }
.header-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; margin-top:4px; }
.icon-btn { background:#1c1c1e; border:none; color:#aaa; border-radius:10px; width:38px; height:38px; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.icon-btn:active { opacity:.6; }

.section-label { font-size:0.68rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#555; padding:0 1.5rem; margin-bottom:0.6rem; }

.mode-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:0 1.5rem; margin-bottom:1.1rem; }
.mode-card { background:#1c1c1e; border-radius:14px; padding:0.8rem 0.4rem; text-align:center; cursor:pointer; border:2px solid transparent; transition:border-color .15s,background .15s; }
.mode-card.active { border-color:#fff; background:#28282c; }
.mode-icon { font-size:1.7rem; display:block; margin-bottom:4px; }
.mode-name { font-size:0.82rem; font-weight:700; display:block; }
.mode-desc { font-size:0.63rem; color:#777; display:block; margin-top:2px; line-height:1.3; }

.settings-panel { background:#1c1c1e; margin:0 1.5rem; border-radius:14px; padding:0.9rem 1rem; margin-bottom:0.9rem; }
.settings-row { display:flex; align-items:center; justify-content:space-between; }
.settings-row label { font-size:0.88rem; color:#ccc; }
.toggle-wrap { display:flex; background:#111; border-radius:20px; padding:3px; gap:3px; }
.toggle-opt { padding:4px 14px; border-radius:16px; font-size:0.78rem; font-weight:700; cursor:pointer; color:#666; transition:all .15s; }
.toggle-opt.active { background:#fff; color:#111; }

.dest-section { padding:0 1.5rem; margin-bottom:0.9rem; }
.dest-input-wrap { background:#1c1c1e; border-radius:14px; display:flex; align-items:center; padding:0 1rem; gap:10px; }
.dest-input-wrap input { background:none; border:none; outline:none; color:#fff; font-size:1rem; padding:0.9rem 0; width:100%; }
.dest-input-wrap input::placeholder { color:#555; }
.search-results { background:#1c1c1e; border-radius:14px; margin-top:6px; overflow:hidden; max-height:190px; overflow-y:auto; }
.search-result-item { padding:0.85rem 1rem; border-bottom:.5px solid #2a2a2a; cursor:pointer; font-size:0.88rem; }
.search-result-item:last-child { border-bottom:none; }
.search-result-item:active { background:#2a2a2e; }
.res-name { font-weight:600; color:#fff; }
.res-addr { font-size:0.72rem; color:#777; margin-top:2px; line-height:1.3; }

.go-btn { margin:0 1.5rem 0; background:#fff; color:#111; border:none; border-radius:14px; font-size:1.05rem; font-weight:700; padding:0.95rem; cursor:pointer; width:calc(100% - 3rem); transition:opacity .15s,transform .1s; }
.go-btn:active { transform:scale(.98); }
.go-btn:disabled { opacity:.25; cursor:default; transform:none; }

.status-bar { padding:0.5rem 1.5rem 0.6rem; font-size:0.75rem; color:#555; display:flex; align-items:center; gap:6px; flex-shrink:0; }
.gps-dot { width:8px; height:8px; border-radius:50%; background:#e74c3c; flex-shrink:0; }
.gps-dot.ok { background:#2ecc71; animation:gpspulse 2s infinite; }
@keyframes gpspulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* MAP PREVIEW */
#screen-map { position:relative; }
.map-topbar { padding:0.85rem 1.5rem 0.5rem; display:flex; align-items:center; gap:12px; background:#111; flex-shrink:0; border-bottom:.5px solid #222; }
.map-back-btn { background:#2a2a2e; border:none; color:#fff; border-radius:10px; padding:7px 14px; font-size:0.85rem; font-weight:600; cursor:pointer; }
.map-title { font-size:0.95rem; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#preview-map { flex:1; min-height:0; }
.route-options { display:flex; flex-direction:column; gap:6px; padding:0.65rem 1rem 0.4rem; background:#111; flex-shrink:0; }
.route-option { background:#1c1c1e; border-radius:12px; padding:0.75rem 1rem; display:flex; align-items:center; gap:12px; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
.route-option.selected { border-color:#fff; }
.route-badge { width:13px; height:13px; border-radius:50%; flex-shrink:0; }
.route-info .ri-title { font-size:0.88rem; font-weight:700; }
.route-info .ri-sub { font-size:0.75rem; color:#888; margin-top:1px; }
.start-route-btn { margin:0.55rem 1rem 1.2rem; background:#fff; color:#111; border:none; border-radius:14px; font-size:1.05rem; font-weight:700; padding:0.9rem; cursor:pointer; flex-shrink:0; }

/* NAV */
.nav-topbar { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem 0.3rem; flex-shrink:0; gap:8px; }
.nav-mode-badge { background:#2a2a2e; border-radius:20px; padding:5px 12px; font-size:0.78rem; font-weight:700; color:#ccc; white-space:nowrap; }
.nav-dest-label { font-size:0.75rem; color:#666; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
.speed-limit-badge { background:#fff; color:#111; border-radius:50%; width:46px; height:46px; display:flex; align-items:center; justify-content:center; flex-direction:column; border:4px solid #c0392b; flex-shrink:0; }
.speed-limit-badge.gone { display:none; }
.slb-num { font-size:1rem; font-weight:900; line-height:1; }
.slb-unit { font-size:0.42rem; font-weight:700; color:#555; line-height:1.2; }

.steps-container { flex:1; padding:0.4rem 0.8rem; display:flex; flex-direction:column; gap:7px; overflow:hidden; min-height:0; }
.step-card { border-radius:16px; padding:0.85rem 1rem; display:flex; align-items:center; gap:0.85rem; flex-shrink:0; }
.step-card.s0 { background:#fff; color:#111; flex:2.2; }
.step-card.s1 { background:#2a2a2e; color:#fff; flex:1.3; }
.step-card.s2 { background:#1e1e22; color:#ccc; flex:1.0; }
.step-card.s3 { background:#171719; color:#999; flex:0.85; }
.step-body { flex:1; min-width:0; }
.step-dist { font-size:0.72rem; opacity:.6; margin-bottom:2px; font-weight:600; }
.step-card.s0 .step-dist { font-size:0.85rem; opacity:.65; }
.step-instr { font-size:0.84rem; font-weight:500; line-height:1.3; }
.step-card.s0 .step-instr { font-size:1.2rem; font-weight:700; line-height:1.25; }

.nav-bottombar { padding:0.55rem 0.8rem 1.4rem; display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:7px; flex-shrink:0; border-top:.5px solid #222; align-items:center; }
.nav-stat { text-align:center; }
.nav-stat-val { font-size:1.4rem; font-weight:700; line-height:1; }
.nav-stat-label { font-size:0.6rem; color:#666; margin-top:3px; text-transform:uppercase; letter-spacing:.5px; }
.nav-stop-btn { background:#c0392b; color:#fff; border:none; border-radius:12px; padding:0.75rem 0.3rem; font-size:0.85rem; font-weight:700; cursor:pointer; width:100%; }

.overlay { position:absolute; inset:0; background:rgba(0,0,0,.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; text-align:center; padding:2rem; z-index:200; }
.overlay-icon { font-size:3.5rem; }
.overlay-title { font-size:1.8rem; font-weight:700; }
.overlay-sub { color:#888; font-size:0.95rem; line-height:1.4; }
.overlay-btn { background:#fff; color:#111; border:none; border-radius:14px; font-size:1rem; font-weight:700; padding:.85rem 2.5rem; cursor:pointer; margin-top:.5rem; }

.spinner { display:inline-block; width:15px; height:15px; border:2px solid rgba(17,17,17,.3); border-top-color:#111; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:7px; }
@keyframes spin { to{transform:rotate(360deg)} }
.leaflet-tile { filter:brightness(.85) contrast(1.1) saturate(.75); }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="home-header">
    <div>
      <h1>🏍️ MotoNav</h1>
      <p>v1.5 &nbsp;·&nbsp; GPS navigator for riders</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleSettings()" title="Units">⚙️</button>
      <button class="icon-btn" onclick="location.reload()" title="Refresh">🔄</button>
    </div>
  </div>

  <div class="settings-panel hidden" id="settings-panel">
    <div class="settings-row">
      <label>Distance &amp; Speed</label>
      <div class="toggle-wrap">
        <div class="toggle-opt active" id="unit-km" onclick="setUnit('km')">km / km/h</div>
        <div class="toggle-opt" id="unit-mi" onclick="setUnit('mi')">mi / mph</div>
      </div>
    </div>
  </div>

  <p class="section-label">Ride mode</p>
  <div class="mode-grid">
    <div class="mode-card active" onclick="selectMode('quick',this)">
      <span class="mode-icon">🚀</span><span class="mode-name">Quick</span><span class="mode-desc">Fastest route</span>
    </div>
    <div class="mode-card" onclick="selectMode('panoramic',this)">
      <span class="mode-icon">🏔️</span><span class="mode-name">Panoramic</span><span class="mode-desc">Scenic roads</span>
    </div>
    <div class="mode-card" onclick="selectMode('sport',this)">
      <span class="mode-icon">🏁</span><span class="mode-name">Sport</span><span class="mode-desc">Curvy backroads</span>
    </div>
  </div>

  <p class="section-label">Destination</p>
  <div class="dest-section">
    <div class="dest-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="dest-input" placeholder="Where to?" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="onDestInput()"/>
    </div>
    <div class="search-results hidden" id="search-results"></div>
  </div>

  <button class="go-btn" id="go-btn" disabled onclick="planRoute()">Preview Route</button>
  <div class="status-bar">
    <div class="gps-dot" id="gps-dot"></div>
    <span id="status-text">Acquiring GPS…</span>
  </div>
</div>

<!-- MAP PREVIEW -->
<div id="screen-map" class="screen hidden">
  <div class="map-topbar">
    <button class="map-back-btn" onclick="backToHome()">← Back</button>
    <div class="map-title" id="map-title">Choose your route</div>
  </div>
  <div id="preview-map"></div>
  <div class="route-options" id="route-options"></div>
  <button class="start-route-btn" onclick="confirmRoute()">Start Ride →</button>
</div>

<!-- NAV -->
<div id="screen-nav" class="screen hidden" style="position:relative;">
  <div class="nav-topbar">
    <div class="nav-mode-badge" id="nav-mode-label">🚀 Quick</div>
    <div class="nav-dest-label" id="nav-dest-label"></div>
    <div class="speed-limit-badge gone" id="speed-limit-badge">
      <div class="slb-num" id="slb-num">50</div>
      <div class="slb-unit" id="slb-unit">km/h</div>
    </div>
  </div>
  <div class="steps-container" id="steps-container"></div>
  <div class="nav-bottombar">
    <div class="nav-stat"><div class="nav-stat-val" id="stat-dist">—</div><div class="nav-stat-label">left</div></div>
    <div class="nav-stat"><div class="nav-stat-val" id="stat-eta">—</div><div class="nav-stat-label">arrival</div></div>
    <div class="nav-stat"><div class="nav-stat-val" id="stat-speed">0</div><div class="nav-stat-label" id="speed-label">km/h</div></div>
    <div class="nav-stat"><button class="nav-stop-btn" onclick="stopNavigation()">■ Stop</button></div>
  </div>
</div>

<script>
var NOMINATIM='https://nominatim.openstreetmap.org/search';
var OVERPASS='https://overpass-api.de/api/interpreter';
var ADVANCE_M=40;
var ROUTE_COLORS=['#3b82f6','#22c55e','#f97316'];
var OSRM={
  quick:'https://router.project-osrm.org/route/v1/driving/',
  panoramic:'https://router.project-osrm.org/route/v1/cycling/',
  sport:'https://router.project-osrm.org/route/v1/driving/'
};
var MODES={quick:{label:'🚀 Quick'},panoramic:{label:'🏔️ Panoramic'},sport:{label:'🏁 Sport'}};

var mode='quick', units='km';
var userPos=null, destCoord=null, destName='';
var steps=[], stepIdx=0, stepCoords=[];
var watchId=null, wakeLock=null, searchTmr=null, lastQuery='';
var speedKmh=0;
var previewMap=null, routeLayers=[], selectedRouteIdx=0, routeData=[];
var settingsOpen=false;
var _slTimer=null;

// GPS
function initGPS(){
  if(!navigator.geolocation){setStatus('GPS not available',false);return;}
  setStatus('Acquiring GPS…',false);
  watchId=navigator.geolocation.watchPosition(onPos,onPosErr,{enableHighAccuracy:true,maximumAge:2000,timeout:15000});
}
function onPos(p){
  userPos={lat:p.coords.latitude,lng:p.coords.longitude};
  speedKmh=p.coords.speed!=null?Math.round(p.coords.speed*3.6):0;
  setStatus('GPS ready',true);
  if(destCoord)document.getElementById('go-btn').disabled=false;
  if(steps.length)onNavGPS();
}
function onPosErr(e){setStatus('GPS error: '+e.message,false);}
function setStatus(msg,ok){
  document.getElementById('status-text').textContent=msg;
  document.getElementById('gps-dot').className='gps-dot'+(ok?' ok':'');
}

// Units
function setUnit(u){
  units=u;
  document.getElementById('unit-km').className='toggle-opt'+(u==='km'?' active':'');
  document.getElementById('unit-mi').className='toggle-opt'+(u==='mi'?' active':'');
  document.getElementById('speed-label').textContent=u==='km'?'km/h':'mph';
  document.getElementById('slb-unit').textContent=u==='km'?'km/h':'mph';
  if(steps.length){renderSteps();updateBar();}
  if(routeData.length)renderRouteOptions();
}
function fmtDist(km){
  if(units==='mi'){var mi=km*0.621371;return mi<0.1?Math.round(mi*1760)+' yd':mi.toFixed(1)+' mi';}
  return km<1?Math.round(km*1000)+' m':km.toFixed(1)+' km';
}
function fmtSpeed(kmh){return units==='mi'?Math.round(kmh*0.621371):Math.round(kmh);}

function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settings-panel').classList.toggle('hidden',!settingsOpen);
}

// Search
function onDestInput(){
  var q=document.getElementById('dest-input').value.trim();
  if(q.length<3){hideResults();return;}
  clearTimeout(searchTmr);
  searchTmr=setTimeout(function(){doSearch(q);},450);
}
async function doSearch(q){
  if(q===lastQuery)return; lastQuery=q;
  var el=document.getElementById('search-results');
  el.classList.remove('hidden');
  el.innerHTML='<div class="search-result-item" style="color:#777">Searching…</div>';
  try{
    var r=await fetch(NOMINATIM+'?q='+encodeURIComponent(q)+'&format=json&limit=6&addressdetails=1',{headers:{'Accept-Language':'en','User-Agent':'MotoNav/1.5'}});
    var data=await r.json();
    if(!data.length){el.innerHTML='<div class="search-result-item" style="color:#777">No results found</div>';return;}
    window._sr=data;
    el.innerHTML=data.map(function(d,i){
      return '<div class="search-result-item" data-idx="'+i+'"><div class="res-name">'+esc(d.name||d.display_name.split(',')[0])+'</div><div class="res-addr">'+esc(d.display_name)+'</div></div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="search-result-item" style="color:#e74c3c">Search failed</div>';}
}
function pickDest(lat,lng,name){
  destCoord={lat:+lat,lng:+lng}; destName=name;
  document.getElementById('dest-input').value=name.split(',')[0];
  hideResults();
  if(userPos)document.getElementById('go-btn').disabled=false;
}
function hideResults(){document.getElementById('search-results').classList.add('hidden');}
document.getElementById('search-results').addEventListener('click',function(e){
  var item=e.target.closest('[data-idx]');
  if(!item||!window._sr)return;
  var d=window._sr[parseInt(item.dataset.idx)];
  if(d)pickDest(d.lat,d.lon,d.display_name);
});
document.addEventListener('click',function(e){if(!e.target.closest('.dest-section'))hideResults();});

// Plan route → map preview
async function planRoute(){
  if(!userPos||!destCoord)return;
  var btn=document.getElementById('go-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Loading routes…';
  try{
    var coords=userPos.lng+','+userPos.lat+';'+destCoord.lng+','+destCoord.lat;
    var params='?steps=true&geometries=geojson&overview=full&annotations=duration&alternatives=3';
    var r=await fetch(OSRM[mode]+coords+params);
    if(!r.ok){var t=await r.text();throw new Error('Routing error '+r.status+': '+t.slice(0,150));}
    var data=await r.json();
    if(data.code!=='Ok')throw new Error('No route found: '+(data.message||''));
    routeData=data.routes; selectedRouteIdx=0;
    showMapPreview();
  }catch(e){
    btn.disabled=false; btn.textContent='Preview Route';
    alert('Could not get route:\n\n'+e.message);
  }
}

function showMapPreview(){
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-map').classList.remove('hidden');
  document.getElementById('map-title').textContent=destName.split(',')[0];
  document.getElementById('go-btn').disabled=false;
  document.getElementById('go-btn').textContent='Preview Route';

  if(!previewMap){
    previewMap=L.map('preview-map',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(previewMap);
  } else {
    routeLayers.forEach(function(l){previewMap.removeLayer(l);});
    routeLayers=[];
  }

  routeData.forEach(function(route,i){
    var coords=route.geometry.coordinates.map(function(c){return[c[1],c[0]];});
    var line=L.polyline(coords,{color:ROUTE_COLORS[i]||'#888',weight:i===selectedRouteIdx?7:4,opacity:i===selectedRouteIdx?0.95:0.4}).addTo(previewMap);
    line._ridx=i;
    line.on('click',function(){selectRouteOption(this._ridx);});
    routeLayers.push(line);
  });

  var mkStart=L.divIcon({html:'<div style="background:#22c55e;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''});
  var mkEnd=L.divIcon({html:'<div style="background:#ef4444;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''});
  routeLayers.push(L.marker([userPos.lat,userPos.lng],{icon:mkStart}).addTo(previewMap));
  routeLayers.push(L.marker([destCoord.lat,destCoord.lng],{icon:mkEnd}).addTo(previewMap));

  var sc=routeData[0].geometry.coordinates.map(function(c){return[c[1],c[0]];});
  previewMap.fitBounds(L.latLngBounds(sc),{padding:[32,32]});
  renderRouteOptions();
  setTimeout(function(){previewMap.invalidateSize();},120);
}

function renderRouteOptions(){
  var el=document.getElementById('route-options');
  var names=['Fastest','Alternative','Scenic alt.'];
  el.innerHTML=routeData.map(function(route,i){
    var distStr=fmtDist(route.distance/1000);
    var dur=Math.round(route.duration/60);
    var durStr=dur>=60?Math.floor(dur/60)+'h '+( dur%60)+'m':dur+' min';
    return '<div class="route-option'+(i===selectedRouteIdx?' selected':'')+'" data-ridx="'+i+'">'
      +'<div class="route-badge" style="background:'+ROUTE_COLORS[i]+'"></div>'
      +'<div class="route-info"><div class="ri-title">'+(names[i]||'Route '+(i+1))+'</div>'
      +'<div class="ri-sub">'+distStr+' &nbsp;·&nbsp; '+durStr+'</div></div></div>';
  }).join('');
}

document.getElementById('route-options').addEventListener('click',function(e){
  var item=e.target.closest('[data-ridx]');
  if(item)selectRouteOption(parseInt(item.dataset.ridx));
});

function selectRouteOption(idx){
  selectedRouteIdx=idx;
  routeLayers.forEach(function(l){
    if(l.setStyle)l.setStyle({weight:l._ridx===idx?7:4,opacity:l._ridx===idx?0.95:0.4});
  });
  renderRouteOptions();
  var coords=routeData[idx].geometry.coordinates.map(function(c){return[c[1],c[0]];});
  previewMap.fitBounds(L.latLngBounds(coords),{padding:[32,32]});
}

function backToHome(){
  document.getElementById('screen-map').classList.add('hidden');
  document.getElementById('screen-home').classList.remove('hidden');
}

function confirmRoute(){
  var leg=routeData[selectedRouteIdx].legs[0];
  steps=leg.steps.map(function(s){
    return{
      instruction:buildInstruction(s),
      dist:s.distance/1000,
      svgLarge:makeSVG(s.maneuver.type,s.maneuver.modifier,true),
      svgSmall:makeSVG(s.maneuver.type,s.maneuver.modifier,false),
      lat:s.maneuver.location[1],
      lng:s.maneuver.location[0]
    };
  });
  stepCoords=steps.map(function(s){return{lat:s.lat,lng:s.lng};});
  stepIdx=0;
  document.getElementById('nav-mode-label').textContent=MODES[mode].label;
  document.getElementById('nav-dest-label').textContent=destName.split(',')[0];
  document.getElementById('screen-map').classList.add('hidden');
  document.getElementById('screen-nav').classList.remove('hidden');
  renderSteps(); updateBar(); acquireWakeLock(); fetchSpeedLimit();
}

// SVG turn icons
function makeSVG(type,mod,large){
  var sz=large?70:42;
  var sw=large?7:5;
  var col=large?'#111':'#eee';
  var bgFill=large?'#f0f0f0':'#2a2a2e';

  if(type==='arrive'){
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 80 80"><circle cx="40" cy="40" r="38" fill="'+bgFill+'"/>'
      +'<line x1="40" y1="10" x2="40" y2="55" stroke="'+col+'" stroke-width="'+sw+'" stroke-linecap="round"/>'
      +'<circle cx="40" cy="65" r="5" fill="'+col+'"/></svg>';
  }
  if(type==='roundabout'||type==='rotary'){
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 80 80"><circle cx="40" cy="40" r="38" fill="'+bgFill+'"/>'
      +'<circle cx="40" cy="40" r="16" fill="none" stroke="'+col+'" stroke-width="'+sw+'"/>'
      +'<path d="M40 16 A24 24 0 1 1 64 40" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-linecap="round"/>'
      +'<polygon points="67,32 64,46 56,38" fill="'+col+'"/></svg>';
  }

  // Determine path by modifier
  var m=mod||'straight';
  var paths={
    'straight':     'M40 68 L40 12 M40 12 L28 28 M40 12 L52 28',
    'slight right': 'M28 68 Q28 40 58 14 M58 14 L44 16 M58 14 L56 30',
    'right':        'M24 68 L24 40 Q24 20 40 20 Q58 20 58 8 M58 8 L46 14 M58 8 L62 22',
    'sharp right':  'M24 68 L24 44 Q24 16 62 14 M62 14 L50 8 M62 14 L66 28',
    'slight left':  'M52 68 Q52 40 22 14 M22 14 L36 16 M22 14 L24 30',
    'left':         'M56 68 L56 40 Q56 20 40 20 Q22 20 22 8 M22 8 L34 14 M22 8 L18 22',
    'sharp left':   'M56 68 L56 44 Q56 16 18 14 M18 14 L30 8 M18 14 L14 28',
    'uturn':        'M55 68 L55 44 Q55 18 40 18 Q22 18 22 36 L22 48 M22 48 L14 36 M22 48 L30 36'
  };
  var p=paths[m]||paths['straight'];
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 80 80"><circle cx="40" cy="40" r="38" fill="'+bgFill+'"/>'
    +'<path d="'+p+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

// Render nav steps
function renderSteps(){
  var c=document.getElementById('steps-container');
  var slice=steps.slice(stepIdx,stepIdx+4);
  if(!slice.length){showArrived();return;}
  var cls=['s0','s1','s2','s3'];
  var isz=['1.2rem','0.84rem','0.8rem','0.75rem'];
  var fw=['700','500','400','400'];
  c.innerHTML=slice.map(function(s,i){
    var d=fmtDist(s.dist);
    var svg=i===0?s.svgLarge:s.svgSmall;
    return '<div class="step-card '+cls[i]+'">'
      +'<div>'+svg+'</div>'
      +'<div class="step-body">'
      +'<div class="step-dist">'+(i===0?'Now · ':'')+d+'</div>'
      +'<div class="step-instr" style="font-size:'+isz[i]+';font-weight:'+fw[i]+'">'+s.instruction+'</div>'
      +'</div></div>';
  }).join('');
}

function updateBar(){
  var rem=steps.slice(stepIdx).reduce(function(a,s){return a+s.dist;},0);
  document.getElementById('stat-dist').textContent=fmtDist(rem);
  var avg=speedKmh>15?speedKmh:65;
  var eta=new Date(Date.now()+(rem/avg)*3600000);
  document.getElementById('stat-eta').textContent=eta.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('stat-speed').textContent=fmtSpeed(speedKmh);
}

function onNavGPS(){
  updateBar();
  if(stepIdx>=steps.length-1)return;
  var next=stepCoords[stepIdx+1];
  if(!next)return;
  if(haversine(userPos.lat,userPos.lng,next.lat,next.lng)<ADVANCE_M){
    stepIdx++; renderSteps(); updateBar(); fetchSpeedLimit();
    if(stepIdx>=steps.length-1)showArrived();
  }
}

// Speed limit via Overpass
function fetchSpeedLimit(){
  if(!userPos)return;
  clearTimeout(_slTimer);
  _slTimer=setTimeout(async function(){
    try{
      var q='[out:json][timeout:6];way(around:30,'+userPos.lat+','+userPos.lng+')[highway][maxspeed];out 1;';
      var r=await fetch(OVERPASS+'?data='+encodeURIComponent(q));
      var d=await r.json();
      if(d.elements&&d.elements.length){
        var ms=d.elements[0].tags.maxspeed||'';
        var num=parseInt(ms);
        if(!isNaN(num)&&num>0){
          var isMph=ms.toLowerCase().indexOf('mph')>=0;
          var kmh=isMph?Math.round(num*1.60934):num;
          var display=units==='mi'?Math.round(kmh*0.621371):kmh;
          document.getElementById('slb-num').textContent=display;
          document.getElementById('slb-unit').textContent=units==='mi'?'mph':'km/h';
          document.getElementById('speed-limit-badge').classList.remove('gone');
        }
      }
    }catch(e){}
  },2500);
}

function haversine(la1,lo1,la2,lo2){
  var R=6371000,rd=Math.PI/180,dLa=(la2-la1)*rd,dLo=(lo2-lo1)*rd;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*rd)*Math.cos(la2*rd)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function buildInstruction(step){
  var type=step.maneuver.type,mod=step.maneuver.modifier||'',name=step.name||'';
  var road=name?' onto '+name:'';
  if(type==='depart')return'Head '+(mod?mod+' ':'')+(name?'on '+name:'forward');
  if(type==='arrive')return'You have arrived';
  if(type==='roundabout'||type==='rotary'){var ex=step.maneuver.exit?' — exit '+step.maneuver.exit:'';return'Enter roundabout'+ex;}
  if(type==='turn'||type==='new name'||type==='end of road'){
    if(mod==='straight')return'Continue straight'+road;
    if(mod==='slight right')return'Bear right'+road;
    if(mod==='right')return'Turn right'+road;
    if(mod==='sharp right')return'Sharp right'+road;
    if(mod==='uturn')return'Make a U-turn';
    if(mod==='sharp left')return'Sharp left'+road;
    if(mod==='left')return'Turn left'+road;
    if(mod==='slight left')return'Bear left'+road;
  }
  if(type==='merge')return'Merge'+(mod?' '+mod:'')+road;
  if(type==='fork')return'Keep '+(mod.indexOf('left')>=0?'left':'right')+' at fork'+road;
  if(type==='continue')return'Continue'+road;
  if(type==='on ramp')return'Take the ramp'+(mod?' '+mod:'')+road;
  if(type==='off ramp')return'Take the exit'+road;
  return(type+(mod?' '+mod:'')+road).trim();
}

function showArrived(){
  var nav=document.getElementById('screen-nav');
  if(nav.querySelector('.overlay'))return;
  var o=document.createElement('div'); o.className='overlay';
  o.innerHTML='<div class="overlay-icon">🏁</div><div class="overlay-title">You arrived!</div><div class="overlay-sub">'+esc(destName.split(',')[0])+'</div><button class="overlay-btn" onclick="stopNavigation()">Back to home</button>';
  nav.appendChild(o);
}

function stopNavigation(){
  steps=[];stepIdx=0;destCoord=null;destName='';routeData=[];
  document.getElementById('dest-input').value='';
  document.getElementById('go-btn').disabled=true;
  document.getElementById('go-btn').textContent='Preview Route';
  document.getElementById('screen-nav').querySelectorAll('.overlay').forEach(function(e){e.remove();});
  document.getElementById('speed-limit-badge').classList.add('gone');
  document.getElementById('screen-home').classList.remove('hidden');
  document.getElementById('screen-nav').classList.add('hidden');
  if(wakeLock){wakeLock.release();wakeLock=null;}
}

function selectMode(m,el){
  mode=m;
  document.querySelectorAll('.mode-card').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
}

async function acquireWakeLock(){
  try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
  document.addEventListener('visibilitychange',async function(){
    if(wakeLock&&document.visibilityState==='visible')try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
  });
}

// Tap current step card to advance (for testing without moving)
document.addEventListener('click',function(e){
  if(e.target.closest('.step-card.s0')&&steps.length){
    if(stepIdx<steps.length-1){stepIdx++;renderSteps();updateBar();fetchSpeedLimit();}
    else showArrived();
  }
});

initGPS();
</script>
