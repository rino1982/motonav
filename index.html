<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<title>MotoNav</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { background:#111; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; height:100vh; display:flex; flex-direction:column; user-select:none; }
.screen { width:100%; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.hidden { display:none !important; }

/* HOME */
.home-header { padding:1.6rem 1.5rem 0.7rem; display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0; }
.home-header h1 { font-size:1.9rem; font-weight:700; letter-spacing:-1px; }
.home-header p { color:#555; font-size:0.72rem; margin-top:3px; }
.header-actions { display:flex; gap:7px; align-items:center; flex-shrink:0; margin-top:4px; }
.icon-btn { background:#1c1c1e; border:none; color:#aaa; border-radius:10px; width:36px; height:36px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.icon-btn:active { opacity:.6; }

.section-label { font-size:0.65rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#555; padding:0 1.5rem; margin-bottom:0.55rem; flex-shrink:0; }

.settings-panel { background:#1c1c1e; margin:0 1.5rem; border-radius:14px; padding:0.85rem 1rem; margin-bottom:0.8rem; flex-shrink:0; }
.settings-row { display:flex; align-items:center; justify-content:space-between; }
.settings-row label { font-size:0.85rem; color:#ccc; }
.toggle-wrap { display:flex; background:#111; border-radius:20px; padding:3px; gap:3px; }
.toggle-opt { padding:4px 12px; border-radius:16px; font-size:0.75rem; font-weight:700; cursor:pointer; color:#666; transition:all .15s; }
.toggle-opt.active { background:#fff; color:#111; }

.mode-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; padding:0 1.5rem; margin-bottom:0.9rem; flex-shrink:0; }
.mode-card { background:#1c1c1e; border-radius:13px; padding:0.75rem 0.35rem; text-align:center; cursor:pointer; border:2px solid transparent; transition:border-color .15s,background .15s; }
.mode-card.active { border-color:#fff; background:#28282c; }

.favs-section { padding:0 1.5rem; margin-bottom:0.7rem; flex-shrink:0; }

.dest-section { padding:0 1.5rem; margin-bottom:0.7rem; flex-shrink:0; }
.dest-input-wrap { background:#1c1c1e; border-radius:13px; display:flex; align-items:center; padding:0 0.9rem; gap:9px; }
.dest-input-wrap input { background:none; border:none; outline:none; color:#fff; font-size:0.95rem; padding:0.85rem 0; width:100%; }

.search-results { background:#1c1c1e; border-radius:13px; margin-top:5px; overflow:hidden; max-height:170px; overflow-y:auto; }
.search-result-item { padding:0.8rem 1rem; border-bottom:.5px solid #2a2a2a; cursor:pointer; font-size:0.85rem; }
.search-result-item:active { background:#2a2a2e; }

.save-fav-row { padding:0.65rem 1rem; background:#161618; display:flex; align-items:center; gap:8px; }
.save-fav-row input { background:none; border:none; outline:none; color:#fff; flex:1; }
.save-fav-row span { color:#3b82f6; font-weight:700; cursor:pointer; white-space:nowrap; }

.btn-row { display:flex; gap:8px; padding:0 1.5rem; margin-bottom:0.5rem; flex-shrink:0; }
.go-btn { background:#fff; color:#111; border:none; border-radius:13px; font-size:0.95rem; font-weight:700; padding:0.85rem 0; cursor:pointer; flex:2; }

.status-bar { padding:0.4rem 1.5rem 0.5rem; font-size:0.72rem; color:#555; display:flex; align-items:center; gap:6px; flex-shrink:0; }

</style>
</head>

<body>

<div id="screen-home" class="screen">

  <div class="home-header">
    <div><h1>🏍️ MotoNav</h1><p>v1.6 · GPS navigator for riders</p></div>
  </div>

  <p class="section-label">Destination</p>

  <div class="dest-section">
    <div class="dest-input-wrap">
      <input type="text" id="dest-input" placeholder="Where to?" oninput="onDestInput()"/>
    </div>
    <div class="search-results hidden" id="search-results"></div>
  </div>

  <div class="btn-row">
    <button class="go-btn" id="go-btn" disabled>Preview Route</button>
  </div>

</div>

<script>

var NOMINATIM='https://nominatim.openstreetmap.org/search';

var pendingDest=null;
var searchTmr=null;
var lastQuery='';

function onDestInput(){
  var q=document.getElementById('dest-input').value.trim();
  pendingDest=null;

  if(q.length<3){hideResults();return;}

  clearTimeout(searchTmr);
  searchTmr=setTimeout(()=>doSearch(q),300);
}

async function doSearch(q){
  if(q===lastQuery)return;
  lastQuery=q;

  var el=document.getElementById('search-results');
  el.classList.remove('hidden');
  el.innerHTML="Searching...";

  try{
    var r=await fetch(NOMINATIM+'?q='+encodeURIComponent(q)+'&format=json&limit=5');
    var data=await r.json();
    window._data=data;

    el.innerHTML=data.map((d,i)=>`
      <div class='search-result-item' data-i='${i}'>
        <b>${d.name||d.display_name.split(',')[0]}</b><br/>
        <small>${d.display_name}</small>
      </div>
    `).join('');

  }catch(e){
    el.innerHTML="Search failed";
  }
}

document.getElementById('search-results').addEventListener('click',function(e){
  var item=e.target.closest('[data-i]');
  if(!item||!window._data)return;

  var d=window._data[item.dataset.i];
  selectDest(d.lat,d.lon,d.display_name);
});

function selectDest(lat,lng,name){
  pendingDest={lat:+lat,lng:+lng,name:name};
  document.getElementById('dest-input').value=name.split(',')[0];
  showSaveFavRow(lat,lng,name);
}

function showSaveFavRow(lat,lng,name){
  var el=document.getElementById('search-results');
  el.classList.remove('hidden');

  el.innerHTML=`
    <div class="save-fav-row">
      ⭐
      <input id="fav-alias-input" placeholder="Save favourite name"/>
      <span id="fav-save-btn">Save</span>
    </div>
  `;

  setTimeout(()=>{
    document.getElementById('fav-save-btn').onclick=function(){
      hideResults();
    };
  },0);
}

function hideResults(){
  document.getElementById('search-results').classList.add('hidden');
}

/* ===================== ONLY REAL FIX ===================== */
document.addEventListener('click',function(e){
  if(
    !e.target.closest('.dest-section') &&
    !e.target.closest('.favs-section') &&
    !e.target.closest('.search-results') // 🔥 FIX
  ){
    hideResults();
  }
});
/* ========================================================= */

</script>

</body>
</html>
